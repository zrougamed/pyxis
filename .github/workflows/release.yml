name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.0.0); leave empty to use the triggering ref"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    name: Build and publish binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building ${VERSION}"

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build binaries
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X main.version=${VERSION}"
          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            os=${platform%/*}
            arch=${platform#*/}
            ext=""
            [ "$os" = "windows" ] && ext=".exe"
            out="dist/pyxis-${os}-${arch}${ext}"
            echo "→ ${out}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "$LDFLAGS" -o "$out" ./cmd/
          done
          cd dist
          sha256sum pyxis-* > checksums.txt
          for f in pyxis-*; do
            [ "$f" = "checksums.txt" ] && continue
            tar -czf "${f%.exe}.tar.gz" "$f"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: Pyxis ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
